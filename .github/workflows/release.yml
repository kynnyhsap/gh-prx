name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Build and publish precompiled extension binaries
        uses: cli/gh-extension-precompile@v2
        with:
          build_script_override: "script/build.ts"
